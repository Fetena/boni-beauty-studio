<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boni Beauty Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ECE9E2; }
    </style>
</head>
<body class="p-8">

    <div id="root" class="mx-auto w-full max-w-[1200px] bg-white rounded-3xl shadow-2xl overflow-hidden min-h-screen">
        <header class="px-8 py-4 flex justify-between items-center bg-white border-b border-[#0A1D2F]/5">
            <h1 class="text-2xl font-bold uppercase tracking-widest text-[#0A1D2F]">BONI</h1>
            <button onclick="toggleModal(true)" class="bg-[#0A1D2F] text-white px-6 py-2 rounded-full text-sm hover:bg-[#C8B87B] transition">Book Now</button>
        </header>

        <section class="relative h-[550px] flex items-center px-12 bg-stone-100">
            <div class="z-10 max-w-2xl">
                <h1 class="text-4xl md:text-6xl lg:text-7xl font-serif leading-tight text-[#0A1D2F]">Timeless Beauty. Artfully Defined.</h1>
                <button onclick="toggleModal(true)" class="mt-8 bg-[#C8B87B] text-[#0A1D2F] px-8 py-3 rounded-full font-medium hover:bg-[#b0a068] transition">BOOK A CONSULTATION</button>
            </div>
        </section>

        <main class="max-w-5xl mx-auto py-16 px-6">
            <h2 class="text-3xl font-serif text-center mb-10">Our Services</h2>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-stone-50 p-6 rounded-2xl h-72 flex flex-col justify-end">
                    <h3 class="text-xl font-bold">Editorial & Bridal</h3>
                    <p class="text-sm text-stone-600 mt-2">Professional styling for your most important moments.</p>
                </div>
                <div class="bg-stone-50 p-6 rounded-2xl h-72 flex flex-col justify-end">
                    <h3 class="text-xl font-bold">Signature Styling</h3>
                    <p class="text-sm text-stone-600 mt-2">Precision cutting and customized color treatments.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="bookingModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-[#0A1D2F]/80 backdrop-blur-md">
        <div class="bg-[#FDFBF5] w-full max-w-md p-6 rounded-3xl shadow-2xl relative">
            <button onclick="toggleModal(false)" class="absolute top-6 right-6 text-[#0A1D2F]/40 hover:text-[#0A1D2F]">✕</button>
            <h2 class="text-3xl font-serif text-[#0A1D2F] mb-6">Request Booking</h2>
            <form id="bookingForm" class="space-y-4">
                <input type="text" placeholder="Full Name" required class="w-full p-3 rounded-xl border border-[#0A1D2F]/10 outline-none">
                <input type="email" placeholder="Email" required class="w-full p-3 rounded-xl border border-[#0A1D2F]/10 outline-none">
                <button type="submit" class="w-full bg-[#0A1D2F] text-white py-4 rounded-xl font-bold hover:bg-[#C8B87B]">Confirm Request</button>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('bookingModal').classList.toggle('hidden', !show);
        }

        document.getElementById('bookingForm').onsubmit = function(e) {
            e.preventDefault();
            alert('Booking request sent successfully!');
            toggleModal(false);
        };
    </script>
</body>
</html>
